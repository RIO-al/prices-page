<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boot prices • تصميم الصفوف المزدوجة</title>

<style>

*{box-sizing:border-box}

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:url('background.jpg') no-repeat center center fixed;
background-size:cover;
min-height:100vh;
margin:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
direction:rtl;
overflow-x:hidden
}

/* إشعار iOS */
.ios-notification{
position:fixed;
top:-100px;
left:50%;
transform:translateX(-50%);
width:300px;
background:rgba(255,255,255,0.95);
backdrop-filter:blur(15px);
border-radius:20px;
padding:10px;
display:flex;
align-items:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
z-index:9999;
transition:top .6s cubic-bezier(.68,-.55,.27,1.55);
direction:ltr
}

.ios-notification.show{top:15px}

.notif-img{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
margin-right:10px
}

.notif-title{
font-weight:bold;
font-size:1em;
color:#000;
margin:0;
display:block
}

.notif-body{
font-weight:bold;
font-size:.8em;
color:#333;
margin:2px 0 0 0;
display:block
}

/* المربع الأسود */
.outer-black-box{
background:#000;
border-radius:12px;
padding:12px 20px;
margin-bottom:20px;
border:2px solid #fff;
box-shadow:0 4px 20px rgba(0,0,0,.7);
width:520px;
max-width:92%;
display:flex;
align-items:center;
justify-content:space-between
}

.corner-text{
font-size:1.4em;
font-weight:bold;
color:#fff;
margin:0;
flex:1;
text-align:right
}

.log-image{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
border:2px solid #fff
}

/* المربع الشفاف */
.container{
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
border-radius:16px;
padding:25px 30px;
box-shadow:0 8px 32px rgba(0,0,0,.3);
border:1px solid rgba(255,255,255,.2);
width:520px;
max-width:92%;
position:relative
}

/* الصفوف */
.pricing-rows{
display:flex;
flex-direction:column;
gap:8px;
width:100%
}

.price-row{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px dashed rgba(255,255,255,.2);
padding:6px 0
}

.price-row:last-child{border-bottom:none}

.right-item,
.left-item{
font-size:1.4em;
color:#fff;
font-weight:500;
white-space:nowrap;
text-shadow:1px 1px 2px rgba(0,0,0,.7)
}

/* صورة التليجرام */
.telegram-image-container{
position:absolute;
left:12px;
bottom:-5px;
width:35px
}

.telegram-image{
width:100%;
border-radius:50%;
border:2px solid #fff
}

/* الموبايل */
@media(max-width:600px){

.outer-black-box{
width:95%;
padding:10px
}

.container{
width:95%;
padding:20px
}

.right-item,
.left-item{
font-size:1.2em
}

}

</style>
</head>

<body>

<div id="iosNotif" class="ios-notification">

<img src="1000057489.jpg" class="notif-img">

<div class="notif-content">
<span class="notif-title">TeamRo</span>
<span class="notif-body">Hi, My Friend</span>
</div>

</div>

<div class="outer-black-box">

<div class="corner-text">~ اسعار المدفوعه</div>

<a href="https://t.me/F9XBOT" target="_blank">
<img src="Log2.jpg" class="log-image">
</a>

</div>

<div class="container">

<div class="pricing-rows">

<div class="price-row">
<div class="right-item">1 شهر = 4$</div>
<div class="left-item">7 شهر = 22$</div>
</div>

<div class="price-row">
<div class="right-item">2 شهر = 7$</div>
<div class="left-item">8 شهر = 25$</div>
</div>

<div class="price-row">
<div class="right-item">3 شهر = 10$</div>
<div class="left-item">9 شهر = 28$</div>
</div>

<div class="price-row">
<div class="right-item">4 شهر = 13$</div>
<div class="left-item">10 شهر = 31$</div>
</div>

<div class="price-row">
<div class="right-item">5 شهر = 16$</div>
<div class="left-item">11 شهر = 34$</div>
</div>

<div class="price-row">
<div class="right-item">6 شهر = 19$</div>
<div class="left-item">12 شهر = 37$</div>
</div>

</div>

<div class="telegram-image-container">
<a href="https://t.me/TeamRover" target="_blank">
<img src="Telegram.jpg" class="telegram-image">
</a>
</div>

</div>

<script>

window.onload=function(){

const notif=document.getElementById("iosNotif")

setTimeout(()=>{
notif.classList.add("show")
},1000)

setTimeout(()=>{
notif.classList.remove("show")
},51000)

}

</script>

</body>
</html>
