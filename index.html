<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boot prices</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* إضافة الصورة كخلفية */
            background: url('1000057477.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            direction: rtl;
        }

        .container {
            background: rgba(255, 255, 255, 0.15); /* خلفية شفافة */
            backdrop-filter: blur(10px); /* تأثير ضبابي خلف المربع */
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 90%;
            width: 500px; /* حجم متوسط للمربع */
            position: relative;
        }

        /* نص الزاوية اليمنى - بدون وميض */
        .corner-text {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.8em;
            font-weight: bold;
            color: #1a1a1a; /* اسود لامع */
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            margin: 0;
        }

        /* النصوص في وسط المربع */
        .center-texts {
            text-align: center;
            margin-top: 70px; /* تباعد بين النص العلوي والنصوص الثلاثة */
        }

        .greeting {
            font-size: 1.8em;
            margin: 0; /* إزالة التباعد بين النصوص */
            padding: 0; /* إزالة أي حشو داخلي */
            line-height: 1; /* جعل الخط متلاصق بشكل أكبر */
            color: #ffffff; /* ابيض */
            font-weight: 500;
        }

        /* =====  أجهزة الموبايل (شاشات عرضها 600px أو أقل) ===== */
        @media only screen and (max-width: 600px) {
            .container {
                width: 85%;
                padding: 30px;
            }

            .corner-text {
                font-size: 1.4em;
                top: 15px;
                right: 15px;
            }

            .greeting {
                font-size: 1.4em;
                margin: 0;
                line-height: 1;
            }

            .center-texts {
                margin-top: 50px;
            }
        }

        /* =====  أجهزة الآيباد والأجهزة اللوحية (شاشات بين 601px و 1024px) ===== */
        @media only screen and (min-width: 601px) and (max-width: 1024px) {
            .container {
                width: 70%;
                padding: 40px;
            }

            .corner-text {
                font-size: 1.6em;
                right: 20px;
            }

            .greeting {
                font-size: 1.6em;
                margin: 0;
                line-height: 1;
            }

            .center-texts {
                margin-top: 60px;
            }
        }

        /* =====  أجهزة الحاسوب (شاشات عرضها 1025px أو أكثر) ===== */
        @media only screen and (min-width: 1025px) {
            .container {
                width: 500px;
                padding: 50px;
            }

            .corner-text {
                font-size: 1.8em;
                right: 20px;
            }

            .greeting {
                font-size: 1.8em;
                margin: 0;
                line-height: 1;
            }

            .center-texts {
                margin-top: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- نص الزاوية اليمنى بدون تأثير وميض -->
        <div class="corner-text">TEᗩᗰ ᖇOᐯEᖇ</div>
        
        <!-- النصوص في الوسط ملتصقة ببعضها البعض -->
        <div class="center-texts">
            <div class="greeting">اهلا بك</div>
            <div class="greeting">كيف حالك</div>
            <div class="greeting">هل انت بخير ؟</div>
        </div>
    </div>
</body>
</html>
