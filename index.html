<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اسعار البوتات</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* إضافة الصورة كخلفية */
            background: url('1000057477.jpg') no-repeat center center fixed;
            background-size: cover; /* تجعل الصورة تغطي كامل الشاشة */
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white; /* النص باللون الأبيض */
            direction: rtl;
        }

        .message {
            /* إضافة طبقة ضبابية خفيفة خلف النص لضمان وضوحه فوق الصورة */
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(5px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); /* ظل للنص لزيادة الوضوح */
        }

        p {
            font-size: 1.5em;
            margin: 5px 0;
            color: #ffffff;
            opacity: 1; /* جعل النص بكامل وضوحه */
        }

        /* =====  أجهزة الموبايل (شاشات عرضها 600px أو أقل) ===== */
        @media only screen and (max-width: 600px) {
            .message {
                width: 85%; /* عرض أكبر نسبياً من الشاشة */
                padding: 25px; /* مسافة داخلية أقل */
            }

            h1 {
                font-size: 1.8em; /* خط أصغر */
            }

            p {
                font-size: 1.2em; /* خط أصغر */
            }
        }

        /* =====  أجهزة الآيباد والأجهزة اللوحية (شاشات بين 601px و 1024px) ===== */
        @media only screen and (min-width: 601px) and (max-width: 1024px) {
            .message {
                width: 70%; /* عرض مناسب للآيباد */
                padding: 35px; /* مسافة داخلية متوسطة */
            }

            h1 {
                font-size: 2.2em; /* خط متوسط */
            }

            p {
                font-size: 1.4em; /* خط متوسط */
            }
        }

        /* =====  أجهزة الحاسوب (شاشات عرضها 1025px أو أكثر) ===== */
        @media only screen and (min-width: 1025px) {
            .message {
                width: 400px; /* عرض ثابت */
                padding: 40px; /* مسافة داخلية أصلية */
            }

            h1 {
                font-size: 2.5em; /* خط كبير */
            }

            p {
                font-size: 1.5em; /* خط كبير */
            }
        }
    </style>
</head>
<body>
    <div class="message">
        <h1>مرحبا صديقي احمد</h1>
        <p>اهلا بك</p>
    </div>
</body>
</html>
