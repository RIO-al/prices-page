<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boot prices</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('1000057477.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            direction: rtl;
            overflow-x: hidden;
        }

        /* --- تصميم إشعار الآيفون --- */
        .ios-notification {
            position: fixed;
            top: -100px; /* يبدأ خارج الشاشة من الأعلى */
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 9999;
            transition: top 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            direction: ltr; /* لضمان تنسيق أيقونة الآيفون يميناً ويساراً */
        }

        .ios-notification.show {
            top: 20px; /* ينزل للأسفل عند التفعيل */
        }

        .notif-img {
            width: 50px;
            height: 50px;
            border-radius: 50%; /* جعل الصورة دائرية */
            object-fit: cover;
            margin-right: 15px;
        }

        .notif-content {
            flex-grow: 1;
            text-align: left;
        }

        .notif-title {
            font-weight: bold;
            font-size: 1.1em;
            color: #000;
            margin: 0;
            display: block;
        }

        .notif-body {
            font-weight: bold;
            font-size: 0.85em;
            color: #333;
            margin: 2px 0 0 0;
            display: block;
        }

        /* --- بقية تنسيقات الصفحة الأصلية --- */
        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px 50px 30px 50px; /* تقليل الحواف السفلية */
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 90%;
            width: 500px;
            position: relative;
        }

        /* تعديل النص العلوي - ثابت في الأعلى يميناً */
        .corner-text {
            position: absolute;
            top: 20px;
            right: 20px; /* تغيير من left إلى right */
            font-size: 1.8em;
            font-weight: bold;
            color: #1a1a1a;
            /* إزالة خاصية الأنيميشن */
            /* animation: blink 2s infinite; */
        }

        /* فاصل بين النص العلوي والأسعار */
        .divider {
            width: 80%;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.5);
            margin: 60px auto 0 auto; /* تباعد عن النص العلوي */
            border-radius: 2px;
        }

        /* حاوية الأسعار مع تباعد بسيط جداً بين الأسطر */
        .prices-container {
            margin-top: 20px;
            line-height: 1.2; /* تقليل المسافة بين الأسطر */
        }

        .greeting {
            font-size: 1.8em;
            /* إزالة الـ margin التي تسبب تباعد */
            margin: 0;
            color: #ffffff;
            font-weight: 500;
            /* إضافة مسافة بسيطة جداً بين الأسطر إذا لزم الأمر */
            line-height: 1.3;
        }

        @media only screen and (max-width: 600px) {
            .ios-notification { width: 90%; }
            .corner-text { 
                font-size: 1.3em; 
                right: 10px;
                top: 10px;
            }
        }
    </style>
</head>
<body>

    <div id="iosNotif" class="ios-notification">
        <img src="1000057489.jpg" alt="Logo" class="notif-img">
        <div class="notif-content">
            <span class="notif-title">TeamRo</span>
            <span class="notif-body">Hi, My Friend</span>
        </div>
    </div>

    <div class="container">
        <!-- نص العنوان في الأعلى على اليمين -->
        <div class="corner-text">• عزيزي اليك اسعار اشتراك البوتات</div>
        
        <!-- فاصل أفقي -->
        <div class="divider"></div>
        
        <!-- نصوص الأسعار بدون تباعد بينها -->
        <div class="prices-container">
            <div class="greeting">1 شهر = 4$</div>
            <div class="greeting">2 شهر = 7$</div>
            <div class="greeting">3 شهر = 10$</div>
            <div class="greeting">4 شهر = 13$</div>
            <div class="greeting">5 شهر = 16$</div>
            <div class="greeting">6 شهر = 19$</div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const notif = document.getElementById('iosNotif');
            
            // إظهار الإشعار بعد ثانية من دخول الموقع
            setTimeout(() => {
                notif.classList.add('show');
            }, 1000);

            // إخفاء الإشعار بعد 50 ثانية (50000 مللي ثانية)
            setTimeout(() => {
                notif.classList.remove('show');
            }, 51000); // أضفت ثانية إضافية لضمان بقاءه 50 ثانية كاملة وهو ظاهر
        };
    </script>

</body>
</html>
