<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boot prices</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('1000057477.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: right; /* تغيير النص ليكون في اليمين */
            direction: rtl;
            overflow-x: hidden;
        }

        /* --- تصميم إشعار الآيفون --- */
        .ios-notification {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 9999;
            transition: top 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            direction: ltr;
        }

        .ios-notification.show {
            top: 20px;
        }

        .notif-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 15px;
        }

        .notif-content {
            flex-grow: 1;
            text-align: left;
        }

        .notif-title {
            font-weight: bold;
            font-size: 1.1em;
            color: #000;
            margin: 0;
            display: block;
        }

        .notif-body {
            font-weight: bold;
            font-size: 0.85em;
            color: #333;
            margin: 2px 0 0 0;
            display: block;
        }

        /* --- تنسيقات الصفحة الرئيسية --- */
        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 30px 30px 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 90%;
            width: 500px;
            position: relative;
            text-align: right; /* محاذاة النص لليمين داخل الحاوية */
        }

        /* النص العلوي - بدون حركة */
        .corner-text {
            font-size: 1.8em;
            font-weight: bold;
            color: #1a1a1a;
            margin: 0 0 5px 0; /* إزالة المسافات العلوية وإضافة مسافة صغيرة أسفل */
            text-align: right;
            display: block;
            width: 100%;
        }

        /* الفاصل - أسفل النص العلوي مباشرة */
        .divider {
            width: 100%;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.7);
            margin: 5px 0 20px 0; /* 5px فوق (أسفل النص) و 20px تحت (فوق الأسعار) */
            border-radius: 2px;
        }

        /* حاوية الأسعار - كلها في اليمين */
        .prices-container {
            text-align: right;
            width: 100%;
        }

        .greeting {
            font-size: 1.8em;
            margin: 0;
            padding: 0;
            color: #ffffff;
            font-weight: 500;
            line-height: 1.3;
            text-align: right;
            display: block;
            width: 100%;
        }

        @media only screen and (max-width: 600px) {
            .ios-notification { width: 90%; }
            .corner-text { 
                font-size: 1.3em; 
            }
            .greeting {
                font-size: 1.4em;
            }
            .container {
                padding: 30px 20px 20px 20px;
            }
        }
    </style>
</head>
<body>

    <div id="iosNotif" class="ios-notification">
        <img src="1000057489.jpg" alt="Logo" class="notif-img">
        <div class="notif-content">
            <span class="notif-title">TeamRo</span>
            <span class="notif-body">Hi, My Friend</span>
        </div>
    </div>

    <div class="container">
        <!-- نص العنوان في الأعلى على اليمين -->
        <div class="corner-text">• عزيزي اليك اسعار اشتراك البوتات</div>
        
        <!-- فاصل أفقي أسفل النص مباشرة (بدون مسافة) -->
        <div class="divider"></div>
        
        <!-- نصوص الأسعار في اليمين بدون تباعد بينها -->
        <div class="prices-container">
            <div class="greeting">1 شهر = 4$</div>
            <div class="greeting">2 شهر = 7$</div>
            <div class="greeting">3 شهر = 10$</div>
            <div class="greeting">4 شهر = 13$</div>
            <div class="greeting">5 شهر = 16$</div>
            <div class="greeting">6 شهر = 19$</div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const notif = document.getElementById('iosNotif');
            
            setTimeout(() => {
                notif.classList.add('show');
            }, 1000);

            setTimeout(() => {
                notif.classList.remove('show');
            }, 51000);
        };
    </script>

</body>
</html>
