<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boot prices</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            direction: rtl;
            overflow-x: hidden;
        }

        /* --- تصميم إشعار الآيفون --- */
        .ios-notification {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 9999;
            transition: top 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            direction: ltr;
        }

        .ios-notification.show {
            top: 20px;
        }

        .notif-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 15px;
        }

        .notif-content {
            flex-grow: 1;
            text-align: left;
        }

        .notif-title {
            font-weight: bold;
            font-size: 1.1em;
            color: #000;
            margin: 0;
            display: block;
        }

        .notif-body {
            font-weight: bold;
            font-size: 0.85em;
            color: #333;
            margin: 2px 0 0 0;
            display: block;
        }

        /* --- تنسيقات الصفحة الرئيسية --- */
        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 90%;
            width: 500px;
            position: relative;
        }

        /* محاذاة جميع النصوص في اليمين */
        .center-texts {
            text-align: right;
        }

        /* النص العلوي البنفسجي بدون نيون */
        .corner-text {
            text-align: right;
            font-size: 1.8em;
            font-weight: bold;
            color: #aa00ff; /* اللون البنفسجي فقط بدون نيون */
            margin: 0 0 15px 0; /* مسافة من الأسفل قبل الخط */
            padding-bottom: 15px; /* مسافة داخلية قبل الخط */
            border-bottom: 3px solid #aa00ff; /* خط فاصل بنفسجي */
            width: 100%;
        }

        /* إزالة التباعد بين النصوص السفلية */
        .greeting {
            font-size: 1.8em;
            color: #ffffff;
            font-weight: 500;
            margin: 0; /* إزالة التباعد الخارجي */
            padding: 0; /* إزالة التباعد الداخلي */
            line-height: 1.4; /* تحسين القراءة مع إبقاء النصوص متقاربة */
            text-align: right;
        }

        /* الحاوية الداخلية للنصوص السفلية */
        .prices-container {
            margin-top: 10px; /* مسافة بسيطة بعد الخط */
            text-align: right;
        }

        @media only screen and (max-width: 600px) {
            .ios-notification { width: 90%; }
        }
    </style>
</head>
<body>

    <div id="iosNotif" class="ios-notification">
        <img src="1000057489.jpg" alt="Logo" class="notif-img">
        <div class="notif-content">
            <span class="notif-title">TeamRo</span>
            <span class="notif-body">Hi, My Friend</span>
        </div>
    </div>

    <div class="container">
        <div class="center-texts">
            <div class="corner-text">• عزيزي اليك اسعار اشتراك البوتات</div>
            <div class="prices-container">
                <div class="greeting">1 شهر = 4$</div>
                <div class="greeting">2 شهر = 7$</div>
                <div class="greeting">3 شهر = 10$</div>
                <div class="greeting">4 شهر = 13$</div>
                <div class="greeting">5 شهر = 16$</div>
                <div class="greeting">6 شهر = 19$</div>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const notif = document.getElementById('iosNotif');
            
            setTimeout(() => {
                notif.classList.add('show');
            }, 1000);

            setTimeout(() => {
                notif.classList.remove('show');
            }, 51000);
        };
    </script>

</body>
</html>
