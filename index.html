<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اسعار البوتات</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* إضافة الصورة كخلفية */
            background: url('1000057477.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            direction: rtl;
        }

        .message {
            padding: 20px;
            max-width: 90%;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            /* الأخضر الزمردي بدون نيون */
            color: #00a86b;
            font-weight: bold;
            /* تم إزالة text-shadow بالكامل */
        }

        .greeting {
            font-size: 1.5em;
            margin: 5px 0;
            /* اللون الكريمي بدون نيون */
            color: #fdf5e6;
            /* تم إزالة text-shadow بالكامل */
        }

        .second-greeting {
            font-size: 1.5em;
            margin: 5px 0;
            /* اللون الكريمي بدون نيون */
            color: #fdf5e6;
            /* تم إزالة text-shadow بالكامل */
        }

        /* =====  أجهزة الموبايل (شاشات عرضها 600px أو أقل) ===== */
        @media only screen and (max-width: 600px) {
            .message {
                width: 85%;
                padding: 15px;
            }

            h1 {
                font-size: 1.8em;
            }

            .greeting, .second-greeting {
                font-size: 1.2em;
            }
        }

        /* =====  أجهزة الآيباد والأجهزة اللوحية (شاشات بين 601px و 1024px) ===== */
        @media only screen and (min-width: 601px) and (max-width: 1024px) {
            .message {
                width: 70%;
                padding: 18px;
            }

            h1 {
                font-size: 2.2em;
            }

            .greeting, .second-greeting {
                font-size: 1.4em;
            }
        }

        /* =====  أجهزة الحاسوب (شاشات عرضها 1025px أو أكثر) ===== */
        @media only screen and (min-width: 1025px) {
            .message {
                width: auto;
                padding: 20px;
            }

            h1 {
                font-size: 2.5em;
            }

            .greeting, .second-greeting {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="message">
        <h1>مرحبا صديقي احمد</h1>
        <p class="greeting">اهلا بك</p>
        <p class="second-greeting">كيف حالك</p>
    </div>
</body>
</html>
