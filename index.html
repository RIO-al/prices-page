<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boot prices · تحديث الأسعار</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            direction: rtl;
            overflow-x: hidden;
        }

        /* --- إشعار الآيفون --- */
        .ios-notification {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 9999;
            transition: top 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            direction: ltr;
        }

        .ios-notification.show {
            top: 20px;
        }

        .notif-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 15px;
        }

        .notif-content {
            flex-grow: 1;
            text-align: left;
        }

        .notif-title {
            font-weight: bold;
            font-size: 1.1em;
            color: #000;
            margin: 0;
            display: block;
        }

        .notif-body {
            font-weight: bold;
            font-size: 0.85em;
            color: #333;
            margin: 2px 0 0 0;
            display: block;
        }

        /* --- المربع الأسود الخارجي --- */
        .outer-black-box {
            background-color: #000000;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            border: 2px solid #ffffff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
            width: 650px;          /* أوسع قليلاً لاستيعاب المحتوى الجديد */
            max-width: 95%;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .corner-text {
            font-size: 1.8em;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
            margin: 0;
            padding: 0;
            flex: 1;
            text-align: right;
        }

        .log-image-link {
            display: inline-block;
            margin-left: 15px;
        }

        .log-image {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ffffff;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(255, 255, 255, 0.2);
        }

        .log-image:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(255, 255, 255, 0.4);
        }

        /* --- المربع الشفاف (container) --- */
        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 45px 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 95%;
            width: 650px;          /* متناسق مع العرض الجديد */
            position: relative;
            box-sizing: border-box;
        }

        /* حاوية النصوص الأساسية (تعديل لعرض عمودين) */
        .prices-grid {
            display: flex;
            flex-direction: row-reverse;   /* ليبقى النص الأول على اليمين */
            justify-content: space-between;
            gap: 30px;
            margin-top: 5px;
            flex-wrap: wrap;
            text-align: right;
        }

        /* كل عمود */
        .price-column {
            flex: 1 1 200px;
            min-width: 150px;
        }

        .price-item {
            font-size: 1.8em;
            color: #ffffff;
            font-weight: 500;
            margin: 0 0 10px 0;       /* مسافة بين الأسطر */
            padding: 0;
            line-height: 1.6;
            text-align: right;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7), -1px -1px 2px rgba(0, 0, 0, 0.7), 
                         1px -1px 2px rgba(0, 0, 0, 0.7), -1px 1px 2px rgba(0, 0, 0, 0.7);
            white-space: nowrap;      /* لئلا ينكسر السعر */
        }

        /* حاوية صورة Telegram (يسار سفلي) */
        .telegram-image-container {
            position: absolute;
            left: 20px;
            bottom: 20px;
            width: 10%;
            min-width: 50px;
            max-width: 80px;
            z-index: 20;
        }

        .telegram-link {
            display: block;
            width: 100%;
            height: 100%;
        }

        .telegram-image {
            width: 100%;
            height: auto;
            border-radius: 50%;
            transition: all 0.3s ease;
            border: 2px solid #ffffff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .telegram-image:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.5);
        }

        /* تكيف مع الشاشات الصغيرة */
        @media only screen and (max-width: 700px) {
            .outer-black-box {
                width: 95%;
                flex-direction: column;
                align-items: flex-start;
                padding: 15px;
            }
            .corner-text {
                font-size: 1.6em;
                margin-bottom: 10px;
            }
            .container {
                width: 95%;
                padding: 30px 20px;
            }
            .prices-grid {
                flex-direction: column;   /* تصبح عمود واحد */
                gap: 5px;
            }
            .price-item {
                font-size: 1.6em;
                white-space: normal;
            }
            .telegram-image-container {
                width: 12%;
                min-width: 45px;
                left: 10px;
                bottom: 10px;
            }
        }

        @media only screen and (max-width: 480px) {
            .ios-notification { width: 90%; }
            .corner-text { font-size: 1.4em; }
            .price-item { font-size: 1.4em; }
        }
    </style>
</head>
<body>

    <!-- إشعار iOS -->
    <div id="iosNotif" class="ios-notification">
        <img src="1000057489.jpg" alt="Logo" class="notif-img">
        <div class="notif-content">
            <span class="notif-title">TeamRo</span>
            <span class="notif-body">Hi, My Friend</span>
        </div>
    </div>

    <!-- المربع الأسود الخارجي -->
    <div class="outer-black-box">
        <div class="corner-text">~ اسعار المدفوعه</div>
        <a href="https://t.me/F9XBOT" class="log-image-link" target="_blank">
            <img src="Log2.jpg" alt="Logo" class="log-image">
        </a>
    </div>

    <!-- المربع الشفاف (النصوص) -->
    <div class="container">
        <!-- شبكة العمودين: الأول 1-6 شهر ، الثاني 7-11 شهر -->
        <div class="prices-grid">
            <!-- العمود الأيمن (الأشهر 1-6) -->
            <div class="price-column">
                <div class="price-item">1 شهر = 4$</div>
                <div class="price-item">2 شهر = 7$</div>
                <div class="price-item">3 شهر = 10$</div>
                <div class="price-item">4 شهر = 13$</div>
                <div class="price-item">5 شهر = 16$</div>
                <div class="price-item">6 شهر = 19$</div>
            </div>
            <!-- العمود الأيسر (الأشهر 7-11) مع النقاط كما طلبت -->
            <div class="price-column">
                <div class="price-item">• 7 شهر = 22$</div>
                <div class="price-item">• 8 شهر = 25$</div>
                <div class="price-item">• 9 شهر = 28$</div>
                <div class="price-item">• 10 شهر = 31$</div>
                <div class="price-item">• 11 شهر = 34$</div>
                <!-- يمكن إضافة 12 شهر إذا أردت، لكن طلبك انتهى عند 11 -->
            </div>
        </div>
        
        <!-- صورة Telegram في أقصى يسار المربع الشفاف -->
        <div class="telegram-image-container">
            <a href="https://t.me/TeamRover" class="telegram-link" target="_blank">
                <img src="Telegram.jpg" alt="Telegram" class="telegram-image">
            </a>
        </div>
    </div>

    <script>
        window.onload = function() {
            const notif = document.getElementById('iosNotif');
            
            setTimeout(() => {
                notif.classList.add('show');
            }, 1000);

            setTimeout(() => {
                notif.classList.remove('show');
            }, 51000);
        };
    </script>

</body>
</html>
