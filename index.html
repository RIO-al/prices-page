<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boot prices</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* استخدمت الصورة التي ارفقتها كخلفية */
            background: url('1000057501.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            direction: rtl;
            overflow-x: hidden;
        }

        /* --- تصميم إشعار الآيفون --- */
        .ios-notification {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 9999;
            transition: top 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            direction: ltr;
        }

        .ios-notification.show {
            top: 20px;
        }

        .notif-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 15px;
        }

        .notif-content {
            flex-grow: 1;
            text-align: left;
        }

        .notif-title {
            font-weight: bold;
            font-size: 1.1em;
            color: #000;
            margin: 0;
            display: block;
        }

        .notif-body {
            font-weight: bold;
            font-size: 0.85em;
            color: #333;
            margin: 2px 0 0 0;
            display: block;
        }

        /* --- تنسيق النص الأرجواني المتوهج (Neon) --- */
        .corner-text {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.6em;
            font-weight: bold;
            /* لون فاتح لمركز النص */
            color: #f3e5f5; 
            /* طبقات الظل لخلق تأثير النيون الأرجواني */
            text-shadow: 
                0 0 7px #fff,
                0 0 10px #bf55ec,
                0 0 21px #bf55ec,
                0 0 42px #9b59b6,
                0 0 82px #9b59b6;
            animation: blink 2s infinite;
        }

        /* --- محتوى الأسعار --- */
        .container {
            background: rgba(0, 0, 0, 0.3); /* تغميق الخلفية قليلاً لإبراز النص */
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 90%;
            width: 500px;
            position: relative;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; } /* جعل الوميض أخف ليحافظ على توهج النيون */
        }

        .greeting {
            font-size: 1.8em;
            margin: 15px 0;
            color: #ffffff;
            font-weight: 500;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }

        @media only screen and (max-width: 600px) {
            .ios-notification { width: 90%; }
            .corner-text { font-size: 1.2em; top: 10px; left: 10px; }
        }
    </style>
</head>
<body>

    <div id="iosNotif" class="ios-notification">
        <img src="1000057489.jpg" alt="Logo" class="notif-img">
        <div class="notif-content">
            <span class="notif-title">TeamRo</span>
            <span class="notif-body">Hi, My Friend</span>
        </div>
    </div>

    <div class="container">
        <div class="corner-text">• عزيزي اليك اسعار اشتراك البوتات</div>
        <div class="center-texts">
            <div class="greeting">1 شهر = 4$</div>
            <div class="greeting">2 شهر = 7$</div>
            <div class="greeting">3 شهر = 10$</div>
            <div class="greeting">4 شهر = 13$</div>
            <div class="greeting">5 شهر = 16$</div>
            <div class="greeting">6 شهر = 19$</div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const notif = document.getElementById('iosNotif');
            
            // إظهار الإشعار بعد ثانية
            setTimeout(() => {
                notif.classList.add('show');
            }, 1000);

            // إخفاء الإشعار بعد 50 ثانية
            setTimeout(() => {
                notif.classList.remove('show');
            }, 51000);
        };
    </script>

</body>
</html>
