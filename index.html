<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اسعار البوتات</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* إضافة الصورة كخلفية */
            background: url('1000057477.jpg') no-repeat center center fixed;
            background-size: cover; /* تجعل الصورة تغطي كامل الشاشة */
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white; /* النص باللون الأبيض */
            direction: rtl;
        }

        .message {
            /* إضافة طبقة ضبابية خفيفة خلف النص لضمان وضوحه فوق الصورة */
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(5px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); /* ظل للنص لزيادة الوضوح */
        }

        p {
            font-size: 1.5em;
            margin: 5px 0;
            color: #ffffff;
            opacity: 1; /* جعل النص بكامل وضوحه */
        }
    </style>
</head>
<body>
    <div class="message">
        <h1>مرحبا صديقي احمد</h1>
        <p>اهلا بك</p>
    </div>
</body>
</html>
