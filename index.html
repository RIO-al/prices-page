<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Boot prices • تصميم الصفوف المزدوجة</title>

<style>

*{box-sizing:border-box}

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:url('background.jpg') no-repeat center center fixed;
background-size:cover;
min-height:100vh;
margin:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
direction:rtl;
overflow:hidden; /* منع التمرير */
position:fixed; /* تثبيت الصفحة */
width:100%;
height:100%;
}

/* إشعار iOS */
.ios-notification{
position:fixed;
top:-100px;
left:50%;
transform:translateX(-50%);
width:320px; /* تكبير العرض قليلاً */
background:#000;
border-radius:25px; /* زيادة الانحناء قليلاً */
padding:12px; /* تكبير الحشو */
display:flex;
align-items:center;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
z-index:9999;
transition:top .6s cubic-bezier(.68,-.55,.27,1.55);
direction:ltr
}

.ios-notification.show{top:15px}

.notif-img{
width:55px; /* تكبير من 40px */
height:55px; /* تكبير من 40px */
border-radius:50%;
object-fit:cover;
margin-right:12px; /* زيادة المسافة */
border:2px solid #fff; /* اضافة اطار للصورة */
}

.notif-title{
font-weight:bold;
font-size:1.2em; /* تكبير الخط */
color:#fff;
margin:0;
display:block
}

.notif-body{
font-weight:bold;
font-size:1em; /* تكبير الخط */
color:#fff;
margin:2px 0 0 0;
display:block
}

/* المربع الأسود */
.outer-black-box{
background:#000;
border-radius:12px;
padding:8px 16px;
margin-bottom:15px;
border:2px solid #fff;
box-shadow:0 4px 20px rgba(0,0,0,.7);
width:460px;
max-width:90%;
display:flex;
align-items:center;
justify-content:space-between
}

.corner-text{
font-size:1.2em;
font-weight:bold;
color:#fff;
margin:0;
flex:1;
text-align:right
}

.log-image{
width:32px;
height:32px;
border-radius:50%;
object-fit:cover;
border:2px solid #fff
}

/* المربع الشفاف */
.container{
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
border-radius:16px;
padding:15px 20px;
box-shadow:0 8px 32px rgba(0,0,0,.3);
border:1px solid rgba(255,255,255,.2);
width:460px;
max-width:90%;
position:relative
}

/* الصفوف */
.pricing-rows{
display:flex;
flex-direction:column;
gap:4px;
width:100%
}

.price-row{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px dashed rgba(255,255,255,.2);
padding:4px 0
}

.price-row:last-child{border-bottom:none}

.right-item,
.left-item{
font-size:1.2em;
color:#fff;
font-weight:500;
white-space:nowrap;
text-shadow:1px 1px 2px rgba(0,0,0,.7)
}

/* Telegram image */
.telegram-image-container{
position:absolute;
left:12px;
bottom:-12px;
width:30px
}

.telegram-image{
width:100%;
border-radius:50%;
border:2px solid #fff
}

/* زر الدفع */
.pay-btn{
margin-top:18px;
background:#000;
color:#fff;
padding:10px 25px;
border-radius:30px;
text-decoration:none;
display:inline-block;
font-size:0.95em;
box-shadow:0 4px 10px rgba(0,0,0,.4)
}

/* النصوص الزرقاء */
.extra-links{
margin-top:12px;
border-top:1px solid rgba(255,255,255,.3);
padding-top:8px;
font-size:13px
}

.extra-links span{
color:#4da3ff;
cursor:pointer;
margin:0 6px
}

/* popup */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:99999
}

.popup-box{
background:#111;
color:#fff;
padding:25px;
border-radius:15px;
max-width:320px;
line-height:1.8
}

.close-btn{
margin-top:15px;
background:#444;
border:none;
color:#fff;
padding:6px 15px;
border-radius:10px;
cursor:pointer
}

</style>
</head>

<body>

<div id="iosNotif" class="ios-notification">

<img src="notice.jpg" class="notif-img">

<div>
<span class="notif-title">𓏺 𝖳𝖾𝖺𝗆 𝖱𝗈𝗏𝖾𝗋</span>

</div>

</div>

<div class="outer-black-box">

<div class="corner-text">اسعار البوت المدفوع</div>

<img src="$.jpg" class="log-image">

</div>

<div class="container">

</div>

<div class="price-row">

</div>

<div class="price-row">

</div>

<div class="price-row">

<div class="extra-links">

<div class="telegram-image-container">

</div>

<a href="https://t.me/F9XBOT" class="pay-btn">اضغط هنا لأستكمال عمليه الدفع</a>


<div id="popup" class="popup">

</div>


<script>

function showPayments(){

1 - Master Card : 7116326351<br>

function closePopup(){
document.getElementById("popup").style.display="none"
}

</script>

</body>
</html>
