<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boot prices</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            direction: rtl;
            overflow-x: hidden;
        }

        /* --- تصميم إشعار الآيفون --- */
        .ios-notification {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 9999;
            transition: top 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            direction: ltr;
        }

        .ios-notification.show {
            top: 20px;
        }

        .notif-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 15px;
        }

        .notif-content {
            flex-grow: 1;
            text-align: left;
        }

        .notif-title {
            font-weight: bold;
            font-size: 1.1em;
            color: #000;
            margin: 0;
            display: block;
        }

        .notif-body {
            font-weight: bold;
            font-size: 0.85em;
            color: #333;
            margin: 2px 0 0 0;
            display: block;
        }

        /* --- تنسيقات الصفحة الرئيسية --- */
        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 90%;
            width: 500px;
            position: relative;
        }

        /* محاذاة جميع النصوص في اليمين */
        .center-texts {
            text-align: right;
            position: relative;
        }

        /* المربع الأسود للنص العلوي والزر */
        .black-box {
            background-color: #000000;
            border-radius: 15px;
            padding: 20px 25px;
            margin-bottom: 30px;
            position: relative;
            border: 2px solid #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            box-sizing: border-box;
        }

        /* النص العلوي داخل المربع الأسود */
        .corner-text {
            font-size: 1.8em;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
            margin: 0;
            padding: 0;
            flex: 1;
        }

        /* زر Click Here داخل المربع الأسود */
        .click-button {
            background-color: #ffffff;
            color: #000000;
            padding: 8px 18px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1em;
            border: 2px solid #ffffff;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(255, 255, 255, 0.2);
            margin-left: 15px;
            white-space: nowrap;
        }

        .click-button:hover {
            background-color: #333333;
            color: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(255, 255, 255, 0.3);
        }

        /* النصوص السفلية مع خط أسود حولها */
        .greeting {
            font-size: 1.8em;
            color: #ffffff;
            font-weight: 500;
            margin: 0;
            padding: 0;
            line-height: 1.4;
            text-align: right;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7), -1px -1px 2px rgba(0, 0, 0, 0.7), 1px -1px 2px rgba(0, 0, 0, 0.7), -1px 1px 2px rgba(0, 0, 0, 0.7);
        }

        /* الحاوية الداخلية للنصوص السفلية */
        .prices-container {
            margin-top: 10px;
            text-align: right;
        }

        /* حاوية الصورة في أقصى اليسار أسفل المربع الشفاف */
        .telegram-image-container {
            position: absolute;
            left: 20px;
            bottom: 20px;
            width: 10%;
            min-width: 50px;
            max-width: 80px;
            z-index: 20;
        }

        .telegram-link {
            display: block;
            width: 100%;
            height: 100%;
        }

        .telegram-image {
            width: 100%;
            height: auto;
            border-radius: 50%;
            transition: all 0.3s ease;
            border: 2px solid #ffffff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .telegram-image:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.5);
        }

        @media only screen and (max-width: 600px) {
            .ios-notification { width: 90%; }
            
            .black-box {
                flex-direction: column;
                align-items: flex-start;
                padding: 15px;
            }
            
            .corner-text {
                font-size: 1.5em;
                margin-bottom: 12px;
            }
            
            .click-button {
                margin-left: 0;
                align-self: flex-start;
            }
            
            .telegram-image-container {
                width: 15%;
                min-width: 40px;
                left: 10px;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <div id="iosNotif" class="ios-notification">
        <img src="1000057489.jpg" alt="Logo" class="notif-img">
        <div class="notif-content">
            <span class="notif-title">TeamRo</span>
            <span class="notif-body">Hi, My Friend</span>
        </div>
    </div>

    <div class="container">
        <div class="center-texts">
            <!-- المربع الأسود الذي يحتوي على النص العلوي وزر Click Here -->
            <div class="black-box">
                <div class="corner-text">• عزيزي اليك اسعار اشتراك البوتات</div>
                <a href="https://t.me/F9XBOT" class="click-button" target="_blank">Click Here</a>
            </div>
            
            <div class="prices-container">
                <div class="greeting">1 شهر = 4$</div>
                <div class="greeting">2 شهر = 7$</div>
                <div class="greeting">3 شهر = 10$</div>
                <div class="greeting">4 شهر = 13$</div>
                <div class="greeting">5 شهر = 16$</div>
                <div class="greeting">6 شهر = 19$</div>
            </div>
        </div>
        
        <!-- صورة Telegram في أقصى يسار المربع الشفاف -->
        <div class="telegram-image-container">
            <a href="https://t.me/TeamRover" class="telegram-link" target="_blank">
                <img src="Telegram.jpg" alt="Telegram" class="telegram-image">
            </a>
        </div>
    </div>

    <script>
        window.onload = function() {
            const notif = document.getElementById('iosNotif');
            
            setTimeout(() => {
                notif.classList.add('show');
            }, 1000);

            setTimeout(() => {
                notif.classList.remove('show');
            }, 51000);
        };
    </script>

</body>
</html>
