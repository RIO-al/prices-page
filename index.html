<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boot prices • تصميم الصفوف المزدوجة</title>

<style>

*{box-sizing:border-box}

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:url('background.jpg') no-repeat center center fixed;
background-size:cover;
min-height:100vh;
margin:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
direction:rtl;
overflow-x:hidden
}

/* إشعار iOS */
.ios-notification{
position:fixed;
top:-100px;
left:50%;
transform:translateX(-50%);
width:300px;
background:#000;
border-radius:20px;
padding:10px;
display:flex;
align-items:center;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
z-index:9999;
transition:top .6s cubic-bezier(.68,-.55,.27,1.55);
direction:ltr
}

.ios-notification.show{top:15px}

.notif-img{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
margin-right:10px
}

.notif-title{
font-weight:bold;
font-size:1em;
color:#fff;
margin:0;
display:block
}

.notif-body{
font-weight:bold;
font-size:.8em;
color:#fff;
margin:2px 0 0 0;
display:block
}

/* المربع الأسود */
.outer-black-box{
background:#000;
border-radius:12px;
padding:12px 20px;
margin-bottom:20px;
border:2px solid #fff;
box-shadow:0 4px 20px rgba(0,0,0,.7);
width:520px;
max-width:92%;
display:flex;
align-items:center;
justify-content:space-between
}

.corner-text{
font-size:1.4em;
font-weight:bold;
color:#fff;
margin:0;
flex:1;
text-align:right
}

.log-image{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
border:2px solid #fff
}

/* المربع الشفاف */
.container{
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
border-radius:16px;
padding:25px 30px;
box-shadow:0 8px 32px rgba(0,0,0,.3);
border:1px solid rgba(255,255,255,.2);
width:520px;
max-width:92%;
position:relative
}

/* الصفوف */
.pricing-rows{
display:flex;
flex-direction:column;
gap:8px;
width:100%
}

.price-row{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px dashed rgba(255,255,255,.2);
padding:6px 0
}

.price-row:last-child{border-bottom:none}

.right-item,
.left-item{
font-size:1.4em;
color:#fff;
font-weight:500;
white-space:nowrap;
text-shadow:1px 1px 2px rgba(0,0,0,.7)
}

/* Telegram image */
.telegram-image-container{
position:absolute;
left:12px;
bottom:-12px;
width:35px
}

.telegram-image{
width:100%;
border-radius:50%;
border:2px solid #fff
}

/* زر الدفع */
.pay-btn{
margin-top:20px;
background:#000;
color:#fff;
padding:12px 30px;
border-radius:30px;
text-decoration:none;
display:inline-block;
font-size:1em;
box-shadow:0 4px 10px rgba(0,0,0,.4)
}

/* النصوص الزرقاء */
.extra-links{
margin-top:15px;
border-top:1px solid rgba(255,255,255,.3);
padding-top:10px;
font-size:14px
}

.extra-links span{
color:#4da3ff;
cursor:pointer;
margin:0 8px
}

/* popup */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:99999
}

.popup-box{
background:#111;
color:#fff;
padding:25px;
border-radius:15px;
max-width:320px;
line-height:1.8
}

.close-btn{
margin-top:15px;
background:#444;
border:none;
color:#fff;
padding:6px 15px;
border-radius:10px;
cursor:pointer
}

</style>
</head>

<body>

<div id="iosNotif" class="ios-notification">

<img src="1000057489.jpg" class="notif-img">

<div>
<span class="notif-title">TeamRo</span>
<span class="notif-body">Hi, My Friend</span>
</div>

</div>

<div class="outer-black-box">

<div class="corner-text">~ اسعار المدفوعه</div>

<img src="Log2.jpg" class="log-image">

</div>

<div class="container">

<div class="pricing-rows">

<div class="price-row">

</div>

<div class="price-row">
<div class="right-item">2 شهر = 7$</div>
<div class="left-item">8 شهر = 25$</div>
</div>

<div class="price-row">
<div class="right-item">3 شهر = 10$</div>
<div class="left-item">9 شهر = 28$</div>
</div>

<div class="price-row">
<div class="right-item">4 شهر = 13$</div>
<div class="left-item">10 شهر = 31$</div>
</div>

<div class="price-row">
<div class="right-item">5 شهر = 16$</div>
<div class="left-item">11 شهر = 34$</div>
</div>

<div class="price-row">
<div class="right-item">6 شهر = 19$</div>
<div class="left-item">12 شهر = 37$</div>
</div>

</div>

<div class="extra-links">
<span onclick="showFeatures()">مشاهده مميزات البوت المدفوع</span>
|
<span onclick="showPayments()">مشاهده طرق الدفع</span>
</div>

<div class="telegram-image-container">
<img src="Telegram.jpg" class="telegram-image">
</div>

</div>

<a href="https://t.me/F9XBOT" class="pay-btn">اضغط هنا لأستكمال عمليه الدفع</a>


<div id="popup" class="popup">
<div class="popup-box" id="popupContent"></div>
</div>


<script>

window.onload=function(){
const notif=document.getElementById("iosNotif")

setTimeout(()=>{notif.classList.remove("show")},51000)

1 - ماستر كارد || Master Card : 7116326351<br>

<button class="close-btn" onclick="closePopup()">اغلاق</button>
`

function closePopup(){

}

</script>

</body>
</html>
