<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اسعار البوتات</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            direction: rtl;
        }
        .message {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 90%;
            width: 400px;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #fff;
            opacity: 0.9; /* تطبيق الشفافية على مرحبا صديقي احمد */
        }
        p {
            font-size: 1.2em;
            margin: 5px 0;
            opacity: 0.9; /* تطبيق الشفافية على اهلا بك */
        }
        .team-name {
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 20px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            opacity: 0.9; /* تطبيق الشفافية على TeamRover */
        }
    </style>
</head>
<body>
    <div class="message">
        <h1>مرحباً صديقي أحمد</h1>
        <p>اهلا بك</p>
        <div class="team-name">TeamRover</div>
    </div>
</body>
</html>    </div>
</body>
</html>
