<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اسعار البوتات</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* إضافة الصورة كخلفية */
            background: url('1000057477.jpg') no-repeat center center fixed;
            background-size: cover; /* تجعل الصورة تغطي كامل الشاشة */
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            direction: rtl;
        }

        .message {
            /* تم إزالة المربع الشفاف بالكامل */
            padding: 20px;
            max-width: 90%;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            /* نص أزرق نيون مناسب للخلفية */
            color: #00f3ff;
            text-shadow: 
                0 0 10px #00f3ff,
                0 0 20px #00f3ff,
                0 0 30px #00b7ff,
                0 0 40px #0088ff;
            font-weight: bold;
        }

        p {
            font-size: 1.5em;
            margin: 5px 0;
            /* نص أزرق نيون للعبارة الثانية */
            color: #00f3ff;
            text-shadow: 
                0 0 8px #00f3ff,
                0 0 15px #00b7ff,
                0 0 25px #0088ff;
            opacity: 0.95;
        }

        /* =====  أجهزة الموبايل (شاشات عرضها 600px أو أقل) ===== */
        @media only screen and (max-width: 600px) {
            .message {
                width: 85%;
                padding: 15px;
            }

            h1 {
                font-size: 1.8em;
                text-shadow: 
                    0 0 8px #00f3ff,
                    0 0 15px #00b7ff,
                    0 0 25px #0088ff;
            }

            p {
                font-size: 1.2em;
                text-shadow: 
                    0 0 5px #00f3ff,
                    0 0 10px #00b7ff,
                    0 0 15px #0088ff;
            }
        }

        /* =====  أجهزة الآيباد والأجهزة اللوحية (شاشات بين 601px و 1024px) ===== */
        @media only screen and (min-width: 601px) and (max-width: 1024px) {
            .message {
                width: 70%;
                padding: 18px;
            }

            h1 {
                font-size: 2.2em;
            }

            p {
                font-size: 1.4em;
            }
        }

        /* =====  أجهزة الحاسوب (شاشات عرضها 1025px أو أكثر) ===== */
        @media only screen and (min-width: 1025px) {
            .message {
                width: auto;
                padding: 20px;
            }

            h1 {
                font-size: 2.5em;
            }

            p {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="message">
        <h1>مرحبا صديقي احمد</h1>
        <p>اهلا بك</p>
    </div>
</body>
</html>
