<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boot prices</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('1000057477.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            direction: rtl;
            overflow-x: hidden;
        }

        /* --- تصميم إشعار الآيفون --- */
        .ios-notification {
            position: fixed;
            top: -100px; /* يبدأ خارج الشاشة من الأعلى */
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 9999;
            transition: top 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            direction: ltr; /* لضمان تنسيق أيقونة الآيفون يميناً ويساراً */
        }

        .ios-notification.show {
            top: 20px; /* ينزل للأسفل عند التفعيل */
        }

        .notif-img {
            width: 50px;
            height: 50px;
            border-radius: 50%; /* جعل الصورة دائرية */
            object-fit: cover;
            margin-right: 15px;
        }

        .notif-content {
            flex-grow: 1;
            text-align: left;
        }

        .notif-title {
            font-weight: bold;
            font-size: 1.1em;
            color: #000;
            margin: 0;
            display: block;
        }

        .notif-body {
            font-weight: bold;
            font-size: 0.85em;
            color: #333;
            margin: 2px 0 0 0;
            display: block;
        }

        /* --- بقية تنسيقات الصفحة الأصلية --- */
        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 90%;
            width: 500px;
            position: relative;
        }

        .corner-text {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.8em;
            font-weight: bold;
            color: #1a1a1a;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .greeting {
            font-size: 1.8em;
            margin: 15px 0;
            color: #ffffff;
            font-weight: 500;
        }

        @media only screen and (max-width: 600px) {
            .ios-notification { width: 90%; }
        }
    </style>
</head>
<body>

    <div id="iosNotif" class="ios-notification">
        <img src="1000057489.jpg" alt="Logo" class="notif-img">
        <div class="notif-content">
            <span class="notif-title">TeamRo</span>
            <span class="notif-body">Hi, My Friend</span>
        </div>
    </div>

    <div class="container">
        <div class="corner-text">TEᗩᗰ ᖇOᐯEᖇ</div>
        <div class="center-texts">
            <div class="greeting">اهلا بك</div>
            <div class="greeting">كيف حالك</div>
            <div class="greeting">هل انت بخير ؟</div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const notif = document.getElementById('iosNotif');
            
            // إظهار الإشعار بعد ثانية من دخول الموقع
            setTimeout(() => {
                notif.classList.add('show');
            }, 1000);

            // إخفاء الإشعار بعد 50 ثانية (50000 مللي ثانية)
            setTimeout(() => {
                notif.classList.remove('show');
            }, 51000); // أضفت ثانية إضافية لضمان بقاءه 50 ثانية كاملة وهو ظاهر
        };
    </script>

</body>
</html>
